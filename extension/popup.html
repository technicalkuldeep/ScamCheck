<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>SCAMCHECK</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header>
      <div class="logo">
        <div class="shield"></div>
        <div>
          <div class="brand">SCAMCHECK</div>
          <div class="sub">SOLANA · RISK SCANNER</div>
        </div>
      </div>
    </header>
    <main>
      <div class="label">Solana address</div>
      <input
        id="addr"
        type="text"
        placeholder="Paste wallet or token mint…"
        autocomplete="off"
        spellcheck="false"
      />
      <button id="scan">SCAN NOW →</button>

      <div id="result" class="result hidden"></div>
      <div id="error" class="error hidden"></div>

      <a id="openapp" href="#" target="_blank">Open full results ↗</a>
    </main>
  </body>
  <script src="popup.js"></script>
</html>
